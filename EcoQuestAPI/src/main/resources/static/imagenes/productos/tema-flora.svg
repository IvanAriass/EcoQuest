<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AD1457"/>
      <stop offset="100%" stop-color="#F06292"/>
    </linearGradient>
    <g id="petal">
      <ellipse cx="0" cy="-14" rx="6" ry="14" fill="white" opacity="0.35"/>
    </g>
    <g id="flower">
      <use href="#petal" transform="rotate(0)"/>
      <use href="#petal" transform="rotate(60)"/>
      <use href="#petal" transform="rotate(120)"/>
      <use href="#petal" transform="rotate(180)"/>
      <use href="#petal" transform="rotate(240)"/>
      <use href="#petal" transform="rotate(300)"/>
      <circle cx="0" cy="0" r="5" fill="white" opacity="0.6"/>
    </g>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg)"/>
  <use href="#flower" x="50" y="60" transform="scale(1.2) translate(-8,-10)"/>
  <use href="#flower" x="150" y="55" transform="scale(0.9) translate(17,6)"/>
  <use href="#flower" x="100" y="40" transform="scale(0.7) translate(43,17)"/>
  <use href="#flower" x="70" y="100" transform="scale(0.6) translate(47,67)"/>
  <use href="#flower" x="130" y="95" transform="scale(0.8) translate(33,24)"/>
  <text x="100" y="165" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="white" opacity="0.95">Flora</text>
</svg>
