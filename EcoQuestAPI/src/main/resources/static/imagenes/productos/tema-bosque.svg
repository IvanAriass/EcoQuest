<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D6B43"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <g id="tree">
      <polygon points="0,-20 -12,10 12,10" fill="#1B5E20" opacity="0.5"/>
      <polygon points="0,-8 -14,18 14,18" fill="#1B5E20" opacity="0.4"/>
      <rect x="-2" y="18" width="4" height="8" fill="#5D4037" opacity="0.6"/>
    </g>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg)"/>
  <use href="#tree" x="30" y="65" transform="scale(1.3) translate(-7,-15)"/>
  <use href="#tree" x="90" y="50" transform="scale(1.6) translate(-33,-19)"/>
  <use href="#tree" x="150" y="60" transform="scale(1.4) translate(-32,-17)"/>
  <use href="#tree" x="60" y="90" transform="scale(0.9) translate(7,10)"/>
  <use href="#tree" x="120" y="80" transform="scale(1) translate(0,0)"/>
  <use href="#tree" x="170" y="85" transform="scale(0.8) translate(43,21)"/>
  <text x="100" y="170" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="white" opacity="0.95">Bosque</text>
</svg>
