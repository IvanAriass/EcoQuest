
# ====================================
# CONFIGURACIÓN GENERAL DE LA APLICACIÓN
# ====================================
spring.application.name=demo
server.port=8080

# ====================================
# CONFIGURACIÓN H2 DATABASE
# ====================================
# Base de datos en memoria (testdb)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console para acceder a la BD directamente
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ====================================
# CONFIGURACIÓN JPA/HIBERNATE
# ====================================
# Dialecto para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Estrategia para crear/actualizar las tablas desde las entidades
# Opciones: validate, update, create, create-drop
spring.jpa.hibernate.ddl-auto=create-drop

# Package scan para las entidades
spring.jpa.properties.hibernate.types.print.banner=false

# Mostrar las sentencias SQL en la consola
spring.jpa.show-sql=true

# Formatear el SQL para mejor legibilidad
spring.jpa.properties.hibernate.format_sql=true

# Mostrar comentarios de Hibernate
spring.jpa.properties.hibernate.use_sql_comments=true

# Ejecutar import.sql DESPUÉS de crear el esquema
spring.sql.init.mode=always

# ====================================
# CONFIGURACIÓN DE LOGGING
# ====================================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ====================================
# ACTUATOR ENDPOINTS
# ====================================
# management.endpoints.web.exposure.include=*
# management.endpoint.health.show-details=always

# ====================================
# CONFIGURACIÓN DEL SERVIDOR
# ====================================
server.servlet.context-path=/
server.compression.enabled=true

# ====================================
# CONFIGURACIÓN ADICIONAL
# ====================================
# Time zone para las fechas
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# Encoding
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.chain.strategy.content.enabled=true
